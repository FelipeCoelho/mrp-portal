<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Relatórios</h1>
    <p class="page-subtitle">Selecione um tipo de relatório para gerar</p>
  </div>

  <div class="relatorios-grid">
    @for (rel of relatorios; track rel.titulo) {
      <div class="relatorio-card" (click)="abrirRelatorio(rel)">
        <div class="relatorio-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <div class="relatorio-content">
          <h3>{{ rel.titulo }}</h3>
          <p>{{ rel.descricao }}</p>
          <span class="relatorio-link">Abrir Relatório →</span>
        </div>
      </div>
    }
  </div>
</div>
